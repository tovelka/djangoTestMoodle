<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
</head>
<body>
    <header>
        {% for m in menu %}
        {% if m.url_name == 'profile' %}
        <a href="{% url m.url_name name='self' %}">{{m.title}}</a>
        {% else %}
        <a href="{% url m.url_name %}">{{m.title}}</a>
        {% endif %}
        {% endfor %}
    </header>
    {% block main_block %}
    {% endblock %}
</body>
</html>
